services:
  backend:
    volumes:
      - ./backend/app:/app/app:cached
      - ./backend/alembic:/app/alembic:cached
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/.env:/app/.env:ro
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"
    environment:
      - WATCHFILES_FORCE_POLLING=false

  worker:
    volumes:
      - ./backend/app:/app/app:cached
      - ./backend/.env:/app/.env:ro
    command: >
      sh -c "python -m arq app.infrastructure.worker.arq_settings.WorkerSettings
            --watch /app/app"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
