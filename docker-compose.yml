services:
  mongodb:
    image: mongo:7
    container_name: virtai-mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-virtai}

    ports:
      - '127.0.0.1:27017:27017'

    volumes:
      - mongodb-data:/data/db

    networks:
      - virtai-network

    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--username',
          '${MONGODB_ROOT_USERNAME}',
          '--password',
          '${MONGODB_ROOT_PASSWORD}',
          '--authenticationDatabase',
          'admin',
          '--eval',
          "db.adminCommand('ping')",
          '--quiet',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: virtai-redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning

    ports:
      - '127.0.0.1:6379:6379'

    volumes:
      - redis-data:/data

    networks:
      - virtai-network

    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: virtai-backend

    restart: unless-stopped

    ports:
      - '8000:8000'

    env_file:
      - ./backend/.env

    volumes:
      - backend-data:/app/.data

    networks:
      - virtai-network

    depends_on:
      mongodb:
        condition: service_healthy

      redis:
        condition: service_healthy

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health']
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    container_name: virtai-frontend

    restart: unless-stopped

    ports:
      - '3000:3000'

    environment:
      VITE_API_TARGET: http://backend:8000

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - virtai-network

  tts:
    image: ghcr.io/matatonic/openedai-speech
    container_name: virtai-tts

    restart: unless-stopped

    ports:
      - '8080:8000'

    environment:
      TTS_HOME: /app/voices

    volumes:
      - tts_voices:/app/voices
      - tts_config:/app/config

    networks:
      - virtai-network

volumes:
  mongodb-data:
  redis-data:
  backend-data:
  tts_voices:
  tts_config:

networks:
  virtai-network:
    driver: bridge
