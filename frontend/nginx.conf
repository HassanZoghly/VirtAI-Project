server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25M;
    client_body_buffer_size 32M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Immutable Cache for static assets served from frontend asset folders only.
    # Keep this scoped away from /api/ so backend routes like /api/v1/audio/... are proxied.
    location ~* ^/(assets|models)/.*\.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|otf|glb|fbx|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA Routing / HTML Cache Defeat
    # index.html strictly must NOT be cached to ensure users pull new chunk maps perfectly.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API / Websocket Proxy Gateway natively shielding CORS and forwarding natively over backend sockets
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
