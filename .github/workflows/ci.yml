name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "BugFix-avatar" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Backend Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio
          
      - name: Run Pytest
        run: |
          cd backend
          pytest tests/
          
  test-frontend:
    name: Frontend Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps
          
      - name: Run Playwright tests
        run: |
          cd frontend
          npx playwright test

  test-load:
    name: Load Tests Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install Locust
        run: pip install locust
        
      - name: Dry-run RAG Throughput Load Test
        run: |
          cd backend
          locust -f tests/load/test_rag_throughput.py --headless -u 1 -r 1 -t 5s
          
      - name: Dry-run Summary Concurrent Load Test
        run: |
          cd backend
          locust -f tests/load/test_summary_concurrent.py --headless -u 1 -r 1 -t 5s
