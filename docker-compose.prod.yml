services:
  backend:
    environment:
      - ENVIRONMENT=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-secure-production-secret-key-123456789}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dummy-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-dummy-client-secret}
      - GOOGLE_REDIRECT_URI=https://my-prod-domain.com/api/v1/auth/google/callback

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: virtai-frontend-prod
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - virtai-network
    restart: unless-stopped
    # Destroy all mapped dev volumes preventing host filesystem bleeding over prod logic.
    volumes: []
