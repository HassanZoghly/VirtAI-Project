services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: virtai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-virtai}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - virtai-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-virtai}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: virtai-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - virtai-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: virtai-backend:latest
    container_name: virtai-backend-init
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      XDG_CACHE_HOME: /app/.cache
      HF_HOME: /app/.cache/huggingface
      FASTEMBED_CACHE_DIR: /app/.cache/fastembed
    networks:
      - virtai-network
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: virtai-backend:latest
    container_name: virtai-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      XDG_CACHE_HOME: /app/.cache
      HF_HOME: /app/.cache/huggingface
      FASTEMBED_CACHE_DIR: /app/.cache/fastembed
    volumes:
      - backend-data:/app/.data
      - backend-cache:/app/.cache
    networks:
      - virtai-network
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tts:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health']
      interval: 10s
      timeout: 10s
      start_period: 90s
      retries: 5

  worker:
    image: virtai-backend:latest
    pull_policy: never
    container_name: virtai-worker
    restart: unless-stopped
    command: ['python', '-m', 'arq', 'app.infrastructure.worker.arq_settings.WorkerSettings']
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      XDG_CACHE_HOME: /app/.cache
      HF_HOME: /app/.cache/huggingface
      FASTEMBED_CACHE_DIR: /app/.cache/fastembed
    volumes:
      - backend-data:/app/.data
      - backend-cache:/app/.cache
    networks:
      - virtai-network
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; redis.Redis(host='redis', password='${REDIS_PASSWORD}').ping()"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: virtai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - virtai-network

  tts:
    build:
      context: ./tts
      dockerfile: Dockerfile
    container_name: virtai-tts
    restart: unless-stopped
    ports:
      - '8080:8000'
    environment:
      TTS_HOME: /app/voices
      HF_HOME: /app/voices/huggingface
    volumes:
      - tts_config:/app/config
      - tts-voices:/app/voices
    networks:
      - virtai-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 15s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        reservations:
          cpus: '1.0'
          memory: '3G'

volumes:
  postgres-data:
  redis-data:
  backend-data:
  backend-cache:
  tts_config:
  tts-voices:

networks:
  virtai-network:
    driver: bridge
