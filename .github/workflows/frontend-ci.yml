name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  lint-and-type:
    name: ESLint · Prettier · TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript type check
        # tsc --noEmit uses tsconfig.json which has noEmit:true — no output, just validation
        run: npx tsc --noEmit

  unit-tests:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        # npm run test maps to: vitest --run
        run: npm run test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # VITE_API_URL is not required for a build check; the build must
        # succeed without real runtime env vars.
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Playwright E2E is NOT included in this PR-gating workflow.
  #
  # REASON: Playwright tests in playwright.config.ts expect
  #   webServer.command = 'npm run dev' → app on localhost:5173
  # Running `npm run dev` (Vite) requires NO external services for a pure
  # frontend smoke test, so it is viable in CI.
  # HOWEVER: The three E2E specs (diagram_flow, explain_flow, quiz_flow)
  # hit backend WebSocket / REST endpoints (hardcoded in the spec files).
  # These will fail without the full stack running.
  #
  # ACTION REQUIRED (see open questions in CICD_ARCHITECTURE.md):
  #   • If the E2E specs are made self-contained (mock APIs), move them here.
  #   • If the full stack is brought up, move them to integration-ci.yml.
  #   • Until either is done, E2E runs are in e2e-manual.yml (workflow_dispatch).
  # ─────────────────────────────────────────────────────────────────────────
