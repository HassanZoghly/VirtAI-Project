name: Playwright E2E (Manual)

# ─────────────────────────────────────────────────────────────────────────
# WHY THIS IS SEPARATE FROM frontend-ci.yml
#
# The three Playwright specs (diagram_flow, explain_flow, quiz_flow)
# issue requests to backend WebSocket and REST endpoints.
# Running them without the full stack would produce meaningless failures.
#
# This workflow is manual-only until one of these conditions is met:
#   A) The specs are rewritten against a mock/stub backend.
#   B) The full docker-compose stack is brought up in CI
#      (see integration-ci.yml as a reference).
#
# To trigger: Actions tab → "Playwright E2E (Manual)" → Run workflow
# ─────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend API base URL for E2E tests (e.g. http://staging-host:8000). No default — a real running backend is required."
        required: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: "true"
          # playwright.config.ts uses VITE dev server on port 5173.
          # The webServer block in playwright.config.ts will start it.
          VITE_API_URL: ${{ github.event.inputs.backend_url }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
