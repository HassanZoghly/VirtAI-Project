<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Primary SEO -->
        <title>VirtAI — Virtual AI Assistant for Speech & Chat</title>
        <meta name="description" content="VirtAI is a virtual AI assistant that converts speech to text, understands your intent, and responds with natural voice using AI models."/>
        <meta name="robots" content="index,follow" />

        <!-- (Enable when you have a real domain)
        <link rel="canonical" href="https://example.com/" />
        <meta property="og:url" content="https://example.com/" /> -->

        <!-- UI / PWA -->
        <meta name="theme-color" content="#f0c852" />
        <meta name="color-scheme" content="dark light" />
        <link rel="manifest" href="/manifest.json" />

        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="/assets/icon.ico" />
        <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png" />
        <link rel="icon" type="image/png" sizes="512x512" href="/assets/icon-512.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />

        <!-- Fonts: Pack 1 (Google Sans + Space Grotesk) -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:opsz,wght@18..144,300;18..144,400;18..144,500;18..144,600;18..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

        <!-- Social sharing (Open Graph) -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="VirtAI" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:title" content="VirtAI — Virtual AI Assistant" />
        <meta property="og:description" content="Talk to VirtAI using your voice and get intelligent spoken responses powered by AI." />
        <meta property="og:image" content="/assets/image.webp" />

        <!-- Social sharing (Twitter) -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="VirtAI — Virtual AI Assistant" />
        <meta name="twitter:description" content="AI-powered voice assistant for speech, chat, and responses." />
        <meta name="twitter:image" content="/assets/image.webp" />

        <!-- Misc -->
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        <meta name="author" content="VirtAI Team" />
        <meta name="application-name" content="VirtAI" />
        <meta name="format-detection" content="telephone=no" />
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
